<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spins & Heels</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #fefefe;
      color: #333;
      padding: 50px;
    }
    h1 {
      font-size: 3em;
      margin-bottom: 0.2em;
    }
    p {
      font-size: 1.2em;
      margin-bottom: 1.5em;
    }
    form input[type="email"] {
      padding: 10px;
      font-size: 1em;
      width: 250px;
      margin-right: 10px;
    }
     form input[type="submit"] {
      padding: 10px 20px;
      font-size: 1em;
      background-color: #ff4081;
      color: white;
      border: none;
      cursor: pointer;
    }
    form input[type="submit"]:hover {
      background-color: #e73370;
    }
  </style>
</head>
<body>
  <!-- LOGO -->
  <img src="logo.png" alt="Spins & Heels Logo" class="logo">

  <!-- Heading -->
  <h1>Spins & Heels — Pole Dance Community Hub</h1>
  <p class="lead">Launching Soon!</p>

  <!-- Features -->
  <ul class="features">
    <li>Competitions & Events</li>
    <li>Pole Camps</li>
    <li>Studios Directory</li>
    <li>Marketplace</li>
  </ul>

  <!-- Newsletter Signup -->
  <p>Subscribe for updates!</p>
  <form action="https://yournewsletterservice.com/subscribe" method="POST">
    <input type="email" name="email" placeholder="Enter your email" required>
    <input type="submit" value="Subscribe">
  </form>

  <p>Stay tuned for competitions, camps, studios, and marketplace!</p>
  
  <!-- Social Links -->
  <div class="social">
    <a href="https://instagram.com/spinsandheels" target="_blank">Instagram</a> |
    <a href="https://tiktok.com/@spinsandheels" target="_blank">TikTok</a> |
    <a href="https://facebook.com/spinsandheels" target="_blank">Facebook</a>
  </div>

  <!-- Optional QR -->
  <div class="qr">
    <p>Scan to follow us on Instagram:</p>
    <img src="qr_instagram.png" alt="QR Code Instagram" width="150">
  </div>

</body>
</html>

  
</head>
